<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPS Upload</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="agicologo.png">

    <!-- Mobile Fullscreen / Web App Manifest Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#090d16">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #090d16;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* Animated Ambient Background Glows */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            opacity: 0.5;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #3b82f6 0%, #1d4ed8 100%);
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #059669 0%, #022c22 100%);
            animation-delay: -4s;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
            100% { transform: scale(1.2) translate(30px, -20px); opacity: 0.65; }
        }

        /* Glass Container Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Logo scaled to match the font height of 'A' */
        .header-logo {
            height: 1em;
            width: auto;
            display: inline-block;
            object-fit: contain;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        /* Modern Buttons */
        .btn {
            position: relative;
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
            letter-spacing: 0.2px;
        }

        /* Subtle shine overlay on buttons */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* Primary Button Style */
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 8px 20px -4px rgba(37, 99, 235, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -4px rgba(37, 99, 235, 0.7);
        }

        /* Secondary Button Style */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Status Banner */
        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
            min-height: 20px;
        }

        /* Status Indicator Dot */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        /* Online Status: Breathing Green Glow */
        .status-dot.online {
            background-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            animation: breathe 2.5s ease-in-out infinite;
        }

        /* Offline Status: Solid Red Alert */
        .status-dot.offline {
            background-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
            animation: none;
        }

        /* Smooth Breathing Keyframe Animation */
        @keyframes breathe {
            0% {
                transform: scale(0.9);
                opacity: 0.5;
                box-shadow: 0 0 4px rgba(16, 185, 129, 0.3);
            }
            50% {
                transform: scale(1.25);
                opacity: 1;
                box-shadow: 0 0 12px rgba(16, 185, 129, 0.9);
            }
            100% {
                transform: scale(0.9);
                opacity: 0.5;
                box-shadow: 0 0 4px rgba(16, 185, 129, 0.3);
            }
        }

        /* Masked Password Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 28px 24px;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .modal-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
            text-align: center;
        }

        .pin-input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .pin-input:focus {
            border-color: #3b82f6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .modal-btn-confirm {
            background: #2563eb;
            color: #ffffff;
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }

        /* Fixed Bottom-Right Fullscreen Floating Button */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        /* Hide exit icon by default */
        .fullscreen-btn .icon-exit {
            display: none;
        }

        /* Toggle icons when fullscreen active */
        :fullscreen .fullscreen-btn .icon-enter {
            display: none;
        }

        :fullscreen .fullscreen-btn .icon-exit {
            display: block;
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="glass-card">
        <div class="header">
            <h1>
                <img src="agicologo.png" alt="AGICO Logo" class="header-logo" />
                AGICO
            </h1>
            <p>Document Digitization Wing</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="openPinModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Claims
            </button>

            <a href="dashboard.html" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                View Dashboard
            </a>
        </div>

        <div class="status-container">
            <div id="dot" class="status-dot online"></div>
            <span id="status">System Ready</span>
        </div>
    </div>

    <!-- Masked PIN Input Modal -->
    <div id="pinModal" class="modal-overlay">
        <div class="modal-card">
            <h3>Enter Security PIN</h3>
            <input type="password" id="pinInput" class="pin-input" placeholder="••••" autocomplete="off" onkeydown="if(event.key==='Enter') submitPin()" />
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closePinModal()">Cancel</button>
                <button class="modal-btn modal-btn-confirm" onclick="submitPin()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Floating Fullscreen Toggle Button -->
    <button class="fullscreen-btn" onclick="toggleFullScreen()" title="Toggle Fullscreen">
        <!-- Expand Brackets Icon -->
        <svg class="icon-enter" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <!-- Restore / Minimize Icon -->
        <svg class="icon-exit" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
    </button>

    <script>
        const GITHUB_USER = "ZahidAsif";
        const REPO_NAME   = "agico";

        // EMBEDDED ENCRYPTED PAYLOAD
        const ENCRYPTED_DATA = {"salt":[94,138,116,195,165,236,41,90,211,230,251,53,38,45,115,214],"iv":[124,103,194,137,148,158,223,126,203,235,18,27],"ciphertext":[3,187,132,156,248,165,138,237,221,106,54,6,76,3,85,171,143,98,244,224,242,130,104,35,116,116,228,104,132,85,118,161,173,5,46,81,64,225,144,130,213,104,0,4,122,255,68,161,2,149,215,104,89,213,34,245]};

        // Network Status Detector
        function updateConnectionStatus() {
            const dot = document.getElementById('dot');
            const statusText = document.getElementById('status');

            if (navigator.onLine) {
                dot.className = 'status-dot online';
                statusText.innerText = "System Ready";
            } else {
                dot.className = 'status-dot offline';
                statusText.innerText = "Offline";
            }
        }

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function openPinModal() {
            const input = document.getElementById('pinInput');
            input.value = '';
            document.getElementById('pinModal').classList.add('open');
            setTimeout(() => input.focus(), 100);
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('open');
        }

        async function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            closePinModal();
            if (!pin) return;

            const status = document.getElementById('status');

            status.innerText = "Authenticating...";

            const decryptedToken = await decryptToken(pin);

            if (!decryptedToken) {
                alert("Incorrect Security PIN, Sir.");
                status.innerText = "Access Denied";
                setTimeout(updateConnectionStatus, 3000);
                return;
            }

            await sendTrigger(decryptedToken);
        }

        async function decryptToken(pin) {
            try {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: new Uint8Array(ENCRYPTED_DATA.salt), iterations: 100000, hash: "SHA-256" },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(ENCRYPTED_DATA.iv) },
                    key,
                    new Uint8Array(ENCRYPTED_DATA.ciphertext)
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        async function sendTrigger(token) {
            const status = document.getElementById('status');

            status.innerText = "Initiating command...";

            try {
                const fileUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/trigger.txt`;

                let sha = "";
                const getRes = await fetch(fileUrl, {
                    headers: { 
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }

                const putRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Remote trigger from web interface",
                        content: btoa(Date.now().toString()),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    status.innerText = "Upload Command Sent!";
                    setTimeout(updateConnectionStatus, 3000);
                } else {
                    const err = await putRes.json().catch(() => ({}));
                    status.innerText = `Error: ${err.message || 'Unauthorized'}`;
                    setTimeout(updateConnectionStatus, 3000);
                }
            } catch (error) {
                status.innerText = "Network Connection Error";
                setTimeout(updateConnectionStatus, 3000);
            }
        }
    </script>
</body>
</html>
