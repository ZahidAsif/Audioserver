 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPS Upload Ver4</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 320px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .btn:active {
            background: #1d4ed8;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #059669;
        }
        .btn-secondary:active {
            background: #047857;
        }
        #status {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn" onclick="sendTrigger()">Upload Claims</button>
        <a href="dashboard.html" class="btn btn-secondary">View Dashboard</a>
        <p id="status"></p>
    </div>

    <script>
        // Paste your NEW token here, split across two variables:
        const T1 = "ghp_ELrogynl3SyCfPS"; 
        const T2 = "3J2OSrVrRNPNtNc0Rf2dw";

        const GITHUB_TOKEN = T1 + T2;
        const GITHUB_USER  = "ZahidAsif";
        const REPO_NAME    = "agico";

        async function sendTrigger() {
            const status = document.getElementById('status');
            status.innerText = "Working on it...";

            try {
                const fileUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/trigger.txt`;
                
                // 1. Get current file SHA (required by GitHub API to update a file)
                let sha = "";
                const getRes = await fetch(fileUrl, {
                    headers: { 
                        'Authorization': `token ${GITHUB_TOKEN.trim()}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }

                // 2. Commit updated timestamp to trigger.txt
                const putRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN.trim()}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Remote trigger from web interface",
                        content: btoa(Date.now().toString()), // Base64 encoded timestamp
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    status.innerText = "Done!";
                    setTimeout(() => status.innerText = "", 3000);
                } else {
                    const err = await putRes.json().catch(() => ({}));
                    status.innerText = `Error ${putRes.status}: ${err.message || 'Unauthorized'}`;
                    console.error("GitHub API Error:", putRes.status, err);
                }
            } catch (error) {
                status.innerText = "Network Error Occurred.";
                console.error("Fetch Exception:", error);
            }
        }
    </script>
</body>
</html>
