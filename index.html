<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRPS Upload Version 18.3.5</title>
    <link rel="icon" type="image/png" href="agicologo.png">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
            --border-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        /* Top Bar */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            animation: flipLogo 5s infinite ease-in-out;
        }

        @keyframes flipLogo {
            0%, 80% { transform: rotateY(0deg) translateY(0); }
            85% { transform: rotateY(180deg) translateY(-6px); }
            90% { transform: rotateY(360deg) translateY(0); }
            100% { transform: rotateY(360deg) translateY(0); }
        }

        .title-text {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Action Controls */
        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            background-color: #1f2937;
            color: var(--text-main);
            border: 1px solid #374151;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #374151;
            border-color: #4b5563;
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #3b82f6;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            border-color: #2563eb;
        }

        /* Status Header */
        .status-card {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #6b7280;
        }

        .status-dot.online { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .status-dot.offline { background-color: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
        .status-dot.checking { background-color: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }

        /* Terminal Console Box */
        .console-wrapper {
            width: 100%;
            max-width: 800px;
            background: #030712;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .console-header {
            background: #111827;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .terminal-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #terminal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4b5563;
        }

        #terminal-dot.online { background-color: var(--accent-green); }

        .console-body {
            height: 380px;
            overflow-y: auto;
            padding: 16px;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .log-row { margin-bottom: 6px; word-break: break-all; }
        .log-time { color: #6b7280; margin-right: 8px; }
        .level-INFO { color: #60a5fa; }
        .level-WARN { color: #facc15; }
        .level-ERROR { color: #f87171; }

        /* Security PIN Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 999;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .modal-box h3 { margin-bottom: 8px; font-size: 1.1rem; }
        .modal-box p { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 16px; }

        .pin-input {
            width: 100%;
            padding: 12px;
            background: #030712;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 16px;
            outline: none;
        }

        .pin-input:focus { border-color: #2563eb; }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button { flex: 1; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="top-bar">
        <div class="logo-container">
            <img src="agicologo.png" alt="AGICO Logo">
            <div class="title-text">AGICO Claim Portal</div>
        </div>
        <div class="controls">
            <button onclick="toggleFullScreen()">Fullscreen</button>
            <button class="btn-primary" onclick="openPinModal()">Execute Task</button>
        </div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
        <div class="status-indicator">
            <div id="dot" class="status-dot checking"></div>
            <span id="status">Connecting...</span>
        </div>
        <button onclick="clearConsole()" style="padding: 4px 10px; font-size: 0.8rem;">Clear Output</button>
    </div>

    <!-- Live Process Terminal -->
    <div class="console-wrapper">
        <div class="console-header">
            <div class="terminal-status">
                <div id="terminal-dot"></div>
                <span>LIVE GIST LOG MONITOR</span>
            </div>
            <span>Gist Sync Mode</span>
        </div>
        <div id="crps-console" class="console-body">
            <div style="font-style: italic; color: #6b7280;">Connecting to Gist log stream, Sir...</div>
        </div>
    </div>

    <!-- Security PIN Modal -->
    <div id="pinModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Security Authentication</h3>
            <p>Enter your authorization PIN to issue command:</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter') submitPin()">
            <div class="modal-actions">
                <button onclick="closePinModal()">Cancel</button>
                <button class="btn-primary" onclick="submitPin()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USER = "ZahidAsif";
        const LOG_GIST_ID = "9aeb0bdcee3fb0b246e8377a2a86c5c5";       // Substitute your Log Gist ID
        const TRIGGER_GIST_ID = "fd6cb36d6953fe5aceeee84ae4db86ec"; // Substitute your Trigger Gist ID

        // Raw Gist link for continuous execution polling
        const GIST_RAW_LOG_URL = `https://gist.githubusercontent.com/${GITHUB_USER}/${LOG_GIST_ID}/raw/crps_logs.json`;

        // EMBEDDED ENCRYPTED PAYLOAD
        const ENCRYPTED_DATA = {"salt":[94,138,116,195,165,236,41,90,211,230,251,53,38,45,115,214],"iv":[124,103,194,137,148,158,223,126,203,235,18,27],"ciphertext":[3,187,132,156,248,165,138,237,221,106,54,6,76,3,85,171,143,98,244,224,242,130,104,35,116,116,228,104,132,85,118,161,173,5,46,81,64,225,144,130,213,104,0,4,122,255,68,161,2,149,215,104,89,213,34,245]};

        let isActionInProgress = false;
        let lastLogContent = "";

        // --- Fetch Logs via Raw Gist Polling ---
        async function pollGistLogs() {
            const consoleBox = document.getElementById('crps-console');
            const termDot = document.getElementById('terminal-dot');

            try {
                // Prevent browser caching using a timestamp
                const response = await fetch(`${GIST_RAW_LOG_URL}?_=${Date.now()}`);
                if (!response.ok) throw new Error("Gist read failed");

                const text = await response.text();
                termDot.classList.add('online');

                if (text !== lastLogContent) {
                    lastLogContent = text;
                    consoleBox.innerHTML = ''; // Reset UI view
                    
                    try {
                        const logsArray = JSON.parse(text);
                        if (Array.isArray(logsArray)) {
                            logsArray.forEach(item => renderLog(item));
                        }
                    } catch (e) {
                        // Raw text fallback parsing
                        const lines = text.trim().split('\n');
                        lines.forEach(line => {
                            if (line) renderLog({ level: 'INFO', message: line, timestamp: new Date().toLocaleTimeString() });
                        });
                    }
                }
            } catch (err) {
                termDot.classList.remove('online');
            } finally {
                setTimeout(pollGistLogs, 3000); // Poll every 3s
            }
        }

        function renderLog(data) {
            const consoleBox = document.getElementById('crps-console');

            const line = document.createElement('div');
            line.className = `log-row level-${data.level || 'INFO'}`;

            const timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = `[${data.timestamp || new Date().toLocaleTimeString()}]`;

            line.appendChild(timeSpan);
            line.appendChild(document.createTextNode(` ${data.message}`));

            consoleBox.appendChild(line);
            requestAnimationFrame(() => {
                consoleBox.scrollTop = consoleBox.scrollHeight;
            });
        }

        function clearConsole() {
            document.getElementById('crps-console').innerHTML = '';
        }

        // --- Network Status Monitor ---
        async function verifyGitHubAccess() {
            if (!navigator.onLine) return false;
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USER}`, { method: 'HEAD' });
                return res.ok;
            } catch (err) {
                return false;
            }
        }

        async function updateConnectionStatus() {
            if (isActionInProgress) return;

            const dot = document.getElementById('dot');
            const statusText = document.getElementById('status');
            const hasAccess = await verifyGitHubAccess();

            if (hasAccess) {
                dot.className = 'status-dot online';
                statusText.innerText = "System Ready";
            } else {
                dot.className = 'status-dot offline';
                statusText.innerText = "Offline";
            }
        }

        setInterval(updateConnectionStatus, 5000);
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();

        pollGistLogs();

        // --- Fullscreen Toggle ---
        function toggleFullScreen() {
            const doc = document;
            const docEl = doc.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.webkitRequestFullScreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFS = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.webkitFullscreenElement && !doc.mozFullScreenElement && !doc.msFullscreenElement) {
                if (requestFS) requestFS.call(docEl);
            } else {
                if (cancelFS) cancelFS.call(doc);
            }
        }

        // --- Security PIN Modal Controls ---
        function openPinModal() {
            const input = document.getElementById('pinInput');
            input.value = '';
            document.getElementById('pinModal').classList.add('open');
            setTimeout(() => input.focus(), 100);
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('open');
        }

        async function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            closePinModal();
            if (!pin) return;

            const status = document.getElementById('status');
            const dot = document.getElementById('dot');

            isActionInProgress = true;
            dot.className = 'status-dot checking';
            status.innerText = "Authenticating...";

            const decryptedToken = await decryptToken(pin);

            if (!decryptedToken) {
                alert("Incorrect Security PIN, Sir.");
                status.innerText = "Access Denied";
                dot.className = 'status-dot offline';
                setTimeout(() => {
                    isActionInProgress = false;
                    updateConnectionStatus();
                }, 3000);
                return;
            }

            await sendTrigger(decryptedToken);
        }

        // --- Web Crypto API Decryption ---
        async function decryptToken(pin) {
            try {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: new Uint8Array(ENCRYPTED_DATA.salt), iterations: 100000, hash: "SHA-256" },
                    keyMaterial,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["decrypt"]
                );
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(ENCRYPTED_DATA.iv) },
                    key,
                    new Uint8Array(ENCRYPTED_DATA.ciphertext)
                );
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        // --- Dispatch Gist Trigger Event ---
        async function sendTrigger(token) {
            const status = document.getElementById('status');
            const dot = document.getElementById('dot');

            status.innerText = "Initiating command...";

            try {
                const gistUrl = `https://api.github.com/gists/${TRIGGER_GIST_ID}`;

                const res = await fetch(gistUrl, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            "trigger.txt": {
                                content: Date.now().toString()
                            }
                        }
                    })
                });

                if (res.ok) {
                    status.innerText = "Command Sent via Gist!";
                    dot.className = 'status-dot online';
                } else {
                    const err = await res.json().catch(() => ({}));
                    status.innerText = `Error: ${err.message || 'Unauthorized'}`;
                    dot.className = 'status-dot offline';
                }
            } catch (error) {
                status.innerText = "Network Connection Error";
                dot.className = 'status-dot offline';
            } finally {
                setTimeout(() => {
                    isActionInProgress = false;
                    updateConnectionStatus();
                }, 3000);
            }
        }
    </script>
</body>
</html>
