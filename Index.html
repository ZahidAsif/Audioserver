<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .play-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h2 { margin: 0 0 10px 0; }
        p { color: #94a3b8; margin: 0; }
    </style>
</head>
<body onclick="toggleAudio()">

    <div class="play-card">
        <div class="icon" id="status-icon">▶️</div>
        <h2 id="status-title">Tap Anywhere to Listen</h2>
        <p id="status-sub">Touch screen to play/pause</p>
    </div>

    <!-- Replace 'campus_guide.mp3' with your audio path -->
    <audio id="myAudio" src="campus_guide.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById('myAudio');

        // Attempt automatic playback if mobile browser permits
        window.addEventListener('load', () => {
            audio.play().then(() => {
                updateUI(true);
            }).catch(() => {
                console.log("Autoplay blocked. User tap required.");
            });
        });

        // Toggle play/pause state on tap
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                updateUI(true);
            } else {
                audio.pause();
                updateUI(false);
            }
        }

        // Reset UI when audio finishes playing
        audio.addEventListener('ended', () => {
            updateUI(false);
            document.getElementById('status-title').innerText = 'Tap Anywhere to Replay';
        });

        function updateUI(isPlaying) {
            if (isPlaying) {
                document.getElementById('status-icon').innerText = '⏸️';
                document.getElementById('status-title').innerText = 'Playing Audio...';
                document.getElementById('status-sub').innerText = 'Touch screen to pause';
            } else {
                document.getElementById('status-icon').innerText = '▶️';
                document.getElementById('status-title').innerText = 'Paused';
                document.getElementById('status-sub').innerText = 'Touch screen to resume';
            }
        }
    </script>
</body>
</html>
